name: Daily Energy Market Update

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:
    inputs:
      backfill_initial:
        description: "Process currently listed documents on the first run instead of baselining them"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: daily-energy-market-update
  cancel-in-progress: false

jobs:
  run-update:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y antiword

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run update pipeline
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.backfill_initial }}" == "true" ]]; then
            EXTRA_ARGS="--backfill-initial"
          fi
          python -m energy_market_updates.cli run --config configs/sources.json ${EXTRA_ARGS}

      - name: Commit generated reports and state
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain data/state reports/daily)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/state reports/daily
            git commit -m "chore: update energy market report"
            git push
          else
            echo "No report or state changes to commit."
          fi
